<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="96" fill="#16A34A"/>
  <!-- Open book -->
  <g transform="translate(256, 280)">
    <!-- Left page -->
    <path d="M-20,-80 C-20,-80 -120,-90 -140,-60 L-140,60 C-120,30 -20,40 -20,40 Z" fill="white" opacity="0.95"/>
    <!-- Right page -->
    <path d="M20,-80 C20,-80 120,-90 140,-60 L140,60 C120,30 20,40 20,40 Z" fill="white" opacity="0.85"/>
    <!-- Spine -->
    <path d="M-20,-80 L-20,40 M20,-80 L20,40" stroke="white" stroke-width="3" opacity="0.5"/>
    <!-- Page lines left -->
    <line x1="-110" y1="-30" x2="-40" y2="-35" stroke="#16A34A" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
    <line x1="-110" y1="-10" x2="-40" y2="-15" stroke="#16A34A" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
    <line x1="-110" y1="10" x2="-40" y2="5" stroke="#16A34A" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
    <!-- Page lines right -->
    <line x1="110" y1="-30" x2="40" y2="-35" stroke="#16A34A" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
    <line x1="110" y1="-10" x2="40" y2="-15" stroke="#16A34A" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
    <line x1="110" y1="10" x2="40" y2="5" stroke="#16A34A" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  </g>
  <!-- Sparkle star -->
  <g transform="translate(330, 140)">
    <path d="M0,-28 L6,-6 L28,0 L6,6 L0,28 L-6,6 L-28,0 L-6,-6 Z" fill="white"/>
  </g>
  <!-- Small sparkle -->
  <g transform="translate(370, 180)">
    <path d="M0,-12 L3,-3 L12,0 L3,3 L0,12 L-3,3 L-12,0 L-3,-3 Z" fill="white" opacity="0.7"/>
  </g>
  <!-- Tiny sparkle -->
  <g transform="translate(290, 160)">
    <path d="M0,-8 L2,-2 L8,0 L2,2 L0,8 L-2,2 L-8,0 L-2,-2 Z" fill="white" opacity="0.5"/>
  </g>
</svg>
