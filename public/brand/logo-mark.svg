<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="96" fill="#16A34A"/>
  <!-- Open book with brain-lightbulb -->
  <g transform="translate(256, 290)">
    <!-- Left page -->
    <path d="M-15,-95 C-15,-95 -130,-105 -150,-75 L-150,65 C-130,35 -15,45 -15,45 Z" fill="white" opacity="0.95"/>
    <!-- Right page -->
    <path d="M15,-95 C15,-95 130,-105 150,-75 L150,65 C130,35 15,45 15,45 Z" fill="white" opacity="0.85"/>
    <!-- Spine -->
    <path d="M-15,-95 L-15,45 M15,-95 L15,45" stroke="white" stroke-width="3" opacity="0.4"/>
  </g>
  <!-- Brain-lightbulb centered in book -->
  <g transform="translate(256, 240)">
    <!-- Lightbulb shape -->
    <path d="M0,-55 C-30,-55 -45,-35 -45,-15 C-45,5 -25,20 -20,30 L20,30 C25,20 45,5 45,-15 C45,-35 30,-55 0,-55Z" fill="white" opacity="0.9"/>
    <!-- Brain detail left -->
    <path d="M-8,-40 C-20,-40 -28,-30 -28,-18 C-28,-8 -20,0 -8,0" stroke="#16A34A" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M-8,-28 C-18,-28 -22,-22 -22,-15" stroke="#16A34A" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Brain detail right -->
    <path d="M8,-40 C20,-40 28,-30 28,-18 C28,-8 20,0 8,0" stroke="#16A34A" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M8,-28 C18,-28 22,-22 22,-15" stroke="#16A34A" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Bulb base -->
    <rect x="-14" y="30" width="28" height="10" rx="3" fill="white" opacity="0.8"/>
    <rect x="-10" y="42" width="20" height="6" rx="3" fill="white" opacity="0.7"/>
  </g>
  <!-- Sparkle -->
  <g transform="translate(345, 145)">
    <path d="M0,-20 L5,-5 L20,0 L5,5 L0,20 L-5,5 L-20,0 L-5,-5 Z" fill="white"/>
  </g>
  <g transform="translate(380, 185)">
    <path d="M0,-10 L3,-3 L10,0 L3,3 L0,10 L-3,3 L-10,0 L-3,-3 Z" fill="white" opacity="0.7"/>
  </g>
</svg>
