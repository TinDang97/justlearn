<?xml version="1.0" encoding="UTF-8"?> <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620"><style> .title { font: 600 20px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1a1a1a; } .subtitle { font: 400 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #666; letter-spacing: 2px; } .label { font: 600 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1a1a1a; letter-spacing: 0.5px; } .label-gray { font: 600 11px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #666; letter-spacing: 0.5px; } .description { font: 400 10px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #666; } .phase-label { font: 600 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1a1a1a; } .phase-desc { font: 400 9px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #555; } .center-text { font: 600 11px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #666; } .example-title { font: 600 11px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1a1a1a; } .example-step { font: 400 10px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #444; } .example-label { font: 600 9px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1a1a1a; letter-spacing: 0.5px; } .insight-text { font: 400 10px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #444; } .insight-bold { font: 600 10px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1a1a1a; } .arrow-label { font: 400 9px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #888; } .legend-text { font: 400 9px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #666; } </style><rect width="800" height="620" fill="#ffffff"></rect><text x="400" y="40" text-anchor="middle" class="title">The Agentic Loop</text><text x="400" y="58" text-anchor="middle" class="subtitle">HOW AI AGENTS ITERATE TOWARD SOLUTIONS</text><g transform="translate(250, 235)"><path d="M 45,-66 Q 85,-66 100,-40" fill="none" stroke="#1a1a1a" stroke-width="1.5"></path><polygon points="100,-40 90,-48 96,-38" fill="#1a1a1a"></polygon><path d="M 100,40 Q 85,66 45,66" fill="none" stroke="#1a1a1a" stroke-width="1.5"></path><polygon points="45,66 55,60 55,72" fill="#1a1a1a"></polygon><path d="M -45,66 Q -85,66 -100,40" fill="none" stroke="#1a1a1a" stroke-width="1.5"></path><polygon points="-100,40 -90,48 -96,38" fill="#1a1a1a"></polygon><path d="M -100,-40 Q -85,-66 -45,-66" fill="none" stroke="#1a1a1a" stroke-width="1.5"></path><polygon points="-45,-66 -55,-60 -55,-72" fill="#1a1a1a"></polygon><text x="-120" y="-55" text-anchor="end" class="arrow-label">REPEAT</text><g transform="translate(0, -90)"><rect x="-55" y="-24" width="110" height="48" fill="#fff" stroke="#1a1a1a" stroke-width="2"></rect><text x="0" y="-3" text-anchor="middle" class="phase-label">PERCEIVE</text><text x="0" y="12" text-anchor="middle" class="phase-desc">Take in information</text></g><g transform="translate(110, 0)"><rect x="-55" y="-24" width="110" height="48" fill="#fff" stroke="#1a1a1a" stroke-width="2"></rect><text x="0" y="-3" text-anchor="middle" class="phase-label">REASON</text><text x="0" y="12" text-anchor="middle" class="phase-desc">Decide what to do</text></g><g transform="translate(0, 90)"><rect x="-55" y="-24" width="110" height="48" fill="#fff" stroke="#1a1a1a" stroke-width="2"></rect><text x="0" y="-3" text-anchor="middle" class="phase-label">ACT</text><text x="0" y="12" text-anchor="middle" class="phase-desc">Take an action</text></g><g transform="translate(-110, 0)"><rect x="-55" y="-24" width="110" height="48" fill="#fff" stroke="#1a1a1a" stroke-width="2"></rect><text x="0" y="-3" text-anchor="middle" class="phase-label">OBSERVE</text><text x="0" y="12" text-anchor="middle" class="phase-desc">See the result</text></g><text x="0" y="-5" text-anchor="middle" class="center-text">ITERATE</text><text x="0" y="10" text-anchor="middle" class="phase-desc">until goal reached</text></g><g transform="translate(480, 105)"><rect x="0" y="0" width="280" height="260" fill="#fafafa" stroke="#999" stroke-width="1"></rect><rect x="10" y="-8" width="165" height="16" fill="#fafafa"></rect><text x="14" y="3" class="label-gray">EXAMPLE: CLAUDE CODE DEBUGGING</text><g transform="translate(20, 35)"><rect x="0" y="-12" width="70" height="20" fill="#fff" stroke="#1a1a1a" stroke-width="1"></rect><text x="35" y="3" text-anchor="middle" class="example-label">PERCEIVE</text><text x="80" y="3" class="example-step">Read error message</text></g><line x1="55" y1="48" x2="55" y2="62" stroke="#999" stroke-width="1"></line><polygon points="55,65 52,58 58,58" fill="#999"></polygon><g transform="translate(20, 85)"><rect x="0" y="-12" width="70" height="20" fill="#fff" stroke="#1a1a1a" stroke-width="1"></rect><text x="35" y="3" text-anchor="middle" class="example-label">REASON</text><text x="80" y="3" class="example-step">Hypothesize cause,</text><text x="80" y="16" class="example-step">decide to check file</text></g><line x1="55" y1="106" x2="55" y2="120" stroke="#999" stroke-width="1"></line><polygon points="55,123 52,116 58,116" fill="#999"></polygon><g transform="translate(20, 143)"><rect x="0" y="-12" width="70" height="20" fill="#fff" stroke="#1a1a1a" stroke-width="1"></rect><text x="35" y="3" text-anchor="middle" class="example-label">ACT</text><text x="80" y="3" class="example-step">Open file, examine code</text></g><line x1="55" y1="156" x2="55" y2="170" stroke="#999" stroke-width="1"></line><polygon points="55,173 52,166 58,166" fill="#999"></polygon><g transform="translate(20, 193)"><rect x="0" y="-12" width="70" height="20" fill="#fff" stroke="#1a1a1a" stroke-width="1"></rect><text x="35" y="3" text-anchor="middle" class="example-label">OBSERVE</text><text x="80" y="3" class="example-step">Find mismatched signature</text></g><path d="M 55,206 L 55,230 Q 55,240 45,240 L -5,240 Q -15,240 -15,230 L -15,35 Q -15,25 -5,25 L 15,25" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="4,2"></path><polygon points="18,25 11,22 11,28" fill="#999"></polygon><text x="55" y="252" class="arrow-label">Loop again with new information</text></g><g transform="translate(40, 420)"><rect x="0" y="0" width="720" height="90" fill="none" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="5,3"></rect><rect x="10" y="-8" width="80" height="16" fill="#fff"></rect><text x="14" y="3" class="label-gray">KEY INSIGHT</text><text x="20" y="30" class="insight-bold">The agent doesn't solve the entire problem in one step.</text><text x="20" y="48" class="insight-text">It takes a small action, sees what happens, and adjusts. Each loop adds information.</text><text x="20" y="66" class="insight-text">Each iteration gets closer to the goal.</text></g><g transform="translate(40, 530)"><rect x="0" y="0" width="350" height="60" fill="#fff" stroke="#ccc" stroke-width="1"></rect><text x="15" y="20" class="example-label">TRADITIONAL AUTOMATION</text><text x="15" y="36" class="example-step">Plan completely → Execute completely</text><text x="15" y="50" class="phase-desc">Brittle — breaks when conditions change</text></g><g transform="translate(410, 530)"><rect x="0" y="0" width="350" height="60" fill="#fff" stroke="#1a1a1a" stroke-width="2"></rect><text x="15" y="20" class="example-label">AGENTIC LOOPS</text><text x="15" y="36" class="example-step">Step → Observe → Adjust → Repeat</text><text x="15" y="50" class="phase-desc">Adaptive — responds to what it finds</text></g><text x="400" y="565" text-anchor="middle" class="label-gray">vs</text></svg> 